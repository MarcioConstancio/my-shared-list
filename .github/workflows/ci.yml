name: CI - Build e Testes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar arquivo .env de teste
        run: |
          echo "SECRET_KEY=chave-secreta-ci-12345" > .env
          echo "DEBUG=True" >> .env
          echo "ALLOWED_HOSTS=*" >> .env
          echo "DB_NAME=my_shared_list" >> .env
          # Usamos o root no CI para garantir que o Django tenha permissão de criar o banco de dados temporário de testes (test_my_shared_list)
          echo "DB_USER=root" >> .env
          echo "DB_PASSWORD=secret_root" >> .env
          echo "EMAIL_HOST_USER=teste@dominio.com" >> .env

      - name: Subir banco de dados e cache
        run: docker compose up -d db redis

      - name: Aguardar inicialização do banco de dados (MySQL)
        # O MySQL pode demorar alguns segundos para inicializar e aceitar conexões pela primeira vez
        run: sleep 25

      - name: Rodar Testes Unitários e de Integração
        # O comando 'run' inicia um container novo apenas para esta execução, contornando a necessidade de ter o Daphne rodando.
        run: docker compose run --rm web python manage.py test
